name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: node -e "require('./api/health'); require('./api/config'); require('./api/state'); require('./api/_lib/roadmap-metadata'); require('./api/_lib/byok-validate'); require('./api/_lib/workspace-dedupe'); require('./src/modules/workspace-merge.js');"
